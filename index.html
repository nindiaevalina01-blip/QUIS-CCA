<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerdas Cermat Alkitab - Edisi Yohanes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #0ea5e9;
            --secondary: #f59e0b;
            --success: #22c55e;
            --bg: #f0f9ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Slide Frame */
        .presentation-box {
            width: 95vw;
            max-width: 1000px;
            height: 600px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border: 10px solid #bae6fd;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Background Elements */
        .decor {
            position: absolute;
            z-index: 0;
            opacity: 0.2;
        }

        /* Slides Management */
        .slide {
            flex: 1;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            z-index: 1;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .slide.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Content Styles */
        h1 { font-family: 'Fredoka', sans-serif; font-size: 56px; color: #0369a1; margin-bottom: 20px; }
        .question-num { background: var(--primary); color: white; padding: 5px 20px; border-radius: 50px; font-weight: bold; margin-bottom: 20px; }
        
        .question-text {
            font-size: 34px;
            font-weight: 700;
            color: #1e293b;
            line-height: 1.3;
            margin-bottom: 30px;
            min-height: 100px;
            display: flex;
            align-items: center;
        }

        .answer-area {
            width: 100%;
            height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .answer-box {
            background: #dcfce7;
            border: 4px solid var(--success);
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            display: none;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .answer-text { font-size: 38px; color: #166534; font-weight: 800; }
        .verse-ref { font-size: 20px; color: #15803d; font-weight: 600; margin-top: 10px; }

        /* Buttons */
        .btn {
            cursor: pointer;
            border: none;
            border-radius: 15px;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            z-index: 5;
        }

        .btn-reveal { background: var(--secondary); color: white; padding: 15px 35px; font-size: 24px; box-shadow: 0 6px 0 #b45309; }
        .btn-reveal:active { transform: translateY(4px); box-shadow: 0 2px 0 #b45309; }

        .controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
        }

        .btn-nav { background: #e2e8f0; color: #475569; padding: 10px 20px; font-size: 18px; }
        .btn-nav:hover { background: #cbd5e1; }
        .btn-next { background: var(--primary); color: white; }

        /* Audio Controls */
        #music-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border: 3px solid var(--primary);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--primary);
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <!-- Audio Files -->
    <!-- Background Music -->
    <audio id="bg-music" loop>
        <source src="https://cdn.pixabay.com/audio/2022/01/18/audio_d0a13f69d2.mp3" type="audio/mpeg">
    </audio>
    <!-- Cheer Effect -->
    <audio id="sfx-cheer">
        <source src="https://cdn.pixabay.com/audio/2021/08/04/audio_32039233ee.mp3" type="audio/mpeg">
    </audio>

    <button id="music-toggle" onclick="toggleMusic()">
        <i id="music-icon" class="fas fa-music"></i>
    </button>

    <div class="presentation-box">
        <!-- Slide 0: Start -->
        <div class="slide active" id="slide-start">
            <i class="fas fa-child-reaching" style="font-size: 80px; color: #0ea5e9; margin-bottom: 20px;"></i>
            <h1>Cerdas Cermat Alkitab</h1>
            <p style="font-size: 22px; color: #64748b; font-weight: 600;">Edisi Khusus: Injil Yohanes</p>
            <div style="margin-top: 40px;">
                <button class="btn btn-reveal" onclick="nextSlide()">Mulai Kuis! <i class="fas fa-play"></i></button>
            </div>
        </div>

        <!-- Dynamic Question Slides will be here -->
        <div id="quiz-slides-container"></div>

        <!-- Final Slide -->
        <div class="slide" id="slide-finish">
            <i class="fas fa-trophy" style="font-size: 100px; color: #f59e0b; margin-bottom: 20px;"></i>
            <h1>Selesai!</h1>
            <p style="font-size: 24px; color: #0ea5e9;">Luar biasa! Teruslah membaca Firman Tuhan.</p>
            <button class="btn btn-reveal" style="margin-top: 30px;" onclick="location.reload()">Ulangi Kuis <i class="fas fa-sync"></i></button>
        </div>

        <!-- Navigation -->
        <div class="controls" id="nav-controls" style="display: none;">
            <button class="btn btn-nav" onclick="prevSlide()"><i class="fas fa-chevron-left"></i> Kembali</button>
            <button class="btn btn-nav btn-next" id="next-btn" onclick="nextSlide()">Lanjut <i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Berapa jumlah ikan dalam peristiwa danau tiberias?", a: "153 Ekor", r: "Yohanes 21:11" },
            { q: "Apa perintah utama Yesus kepada murid-murid-Nya dalam Yohanes 15:12?", a: "Saling Mengasihi", r: "Yohanes 15:12" },
            { q: "Apakah arti dari Golgoltha?", a: "Bukit Tengkorak", r: "Yohanes 19:17" },
            { q: "Sebutkan isi dari ayat Yohanes 15:5!", a: "“Akulah pokok anggur dan kamulah ranting-rantingnya...”", r: "Yohanes 15:5" },
            { q: "Siapakah murid yang Yesus suruh: \"Gembalakanlah domba-domba-Ku\"?", a: "Petrus", r: "Yohanes 21:15-19" },
            { q: "Siapa yang memerintahkan memasang tulisan \"Raja orang Yahudi\" di salib?", a: "Pilatus", r: "Yohanes 19:19" },
            { q: "Siapa yang menguburkan Yesus bersama Yusuf dari Arimatea?", a: "Nikodemus", r: "Yohanes 19:39" },
            { q: "Siapa nama imam besar pada saat Yesus disalib?", a: "Hanas", r: "Yohanes 18:13" },
            { q: "Berapa jumlah orang yang disalibkan bersama-sama dengan Yesus?", a: "2 Orang", r: "Yohanes 19:18" },
            { q: "Siapa yang pertama kali datang ke kubur Yesus pagi-pagi sekali?", a: "Maria Magdalena", r: "Yohanes 20:1" }
        ];

        const container = document.getElementById('quiz-slides-container');
        const bgMusic = document.getElementById('bg-music');
        const sfxCheer = document.getElementById('sfx-cheer');
        let currentSlideIdx = 0;
        let isMusicPlaying = false;

        // Create Slides
        questions.forEach((item, index) => {
            const slideDiv = document.createElement('div');
            slideDiv.className = 'slide quiz-slide';
            slideDiv.id = `quiz-${index}`;
            slideDiv.innerHTML = `
                <div class="question-num">SOAL NO. ${index + 1}</div>
                <div class="question-text">${item.q}</div>
                
                <div class="answer-area">
                    <button class="btn btn-reveal" id="reveal-btn-${index}" onclick="showAnswer(${index})">
                        Lihat Jawaban <i class="fas fa-magic"></i>
                    </button>
                    
                    <div class="answer-box" id="answer-${index}">
                        <div class="answer-text">${item.a}</div>
                        <div class="verse-ref">${item.r}</div>
                    </div>
                </div>
            `;
            container.appendChild(slideDiv);
        });

        const allSlides = document.querySelectorAll('.slide');

        function showSlide(idx) {
            allSlides.forEach(s => s.classList.remove('active'));
            allSlides[idx].classList.add('active');
            
            // Show/Hide navigation
            const nav = document.getElementById('nav-controls');
            if(idx === 0 || idx === allSlides.length - 1) {
                nav.style.display = 'none';
            } else {
                nav.style.display = 'flex';
            }
        }

        function nextSlide() {
            if (!isMusicPlaying) toggleMusic(); // Start music on first interaction
            if (currentSlideIdx < allSlides.length - 1) {
                currentSlideIdx++;
                showSlide(currentSlideIdx);
            }
        }

        function prevSlide() {
            if (currentSlideIdx > 0) {
                currentSlideIdx--;
                showSlide(currentSlideIdx);
            }
        }

        function showAnswer(idx) {
            const ansBox = document.getElementById(`answer-${idx}`);
            const revealBtn = document.getElementById(`reveal-btn-${idx}`);
            
            ansBox.style.display = 'block';
            revealBtn.style.display = 'none';
            
            // Suara Hore!
            sfxCheer.currentTime = 0;
            sfxCheer.play();
        }

        function toggleMusic() {
            const icon = document.getElementById('music-icon');
            if (bgMusic.paused) {
                bgMusic.play();
                isMusicPlaying = true;
                icon.className = 'fas fa-pause';
            } else {
                bgMusic.pause();
                isMusicPlaying = false;
                icon.className = 'fas fa-music';
            }
        }

    </script>
</body>
</html>
