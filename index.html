<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerdas Cermat Alkitab - Edisi Yohanes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #0ea5e9;
            --secondary: #f59e0b;
            --success: #22c55e;
            --bg: #f0f9ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Mencegah scroll bar muncul pada body */
        }

        /* Slide Frame - Ultra Wide Landscape */
        .presentation-box {
            width: 96vw;
            max-width: 1400px; 
            height: 85vh;     /* Menggunakan vh agar menyesuaikan tinggi layar */
            min-height: 600px;
            background: white;
            border-radius: 50px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.15);
            border: 15px solid #bae6fd;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        /* Slides Management */
        .slide {
            flex: 1;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 100px;
            z-index: 1;
            text-align: center;
            animation: fadeIn 0.7s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .slide.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Content Styles */
        h1 { font-family: 'Fredoka', sans-serif; font-size: 72px; color: #0369a1; margin-bottom: 25px; }
        .question-num { 
            background: var(--primary); 
            color: white; 
            padding: 10px 40px; 
            border-radius: 100px; 
            font-weight: bold; 
            margin-bottom: 30px; 
            font-size: 24px; 
            box-shadow: 0 6px 15px rgba(14, 165, 233, 0.4); 
        }
        
        .question-text {
            font-size: 48px; 
            font-weight: 700;
            color: #1e293b;
            line-height: 1.2;
            margin-bottom: 50px;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 95%;
        }

        .answer-area {
            width: 100%;
            height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .answer-box {
            background: #f0fdf4;
            border: 5px solid var(--success);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            display: none;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(34, 197, 94, 0.15);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .answer-text { font-size: 52px; color: #166534; font-weight: 800; }
        .verse-ref { font-size: 26px; color: #15803d; font-weight: 600; margin-top: 15px; font-style: italic; }

        /* Buttons */
        .btn {
            cursor: pointer;
            border: none;
            border-radius: 25px;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            z-index: 5;
            user-select: none;
        }

        .btn-reveal { 
            background: var(--secondary); 
            color: white; 
            padding: 22px 60px; 
            font-size: 32px; 
            box-shadow: 0 10px 0 #b45309; 
        }
        .btn-reveal:hover { background: #fbbf24; transform: translateY(-3px); }
        .btn-reveal:active { transform: translateY(6px); box-shadow: 0 2px 0 #b45309; }

        /* Navigation Controls */
        .controls {
            position: absolute;
            bottom: 50px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 80px;
        }

        .btn-nav { 
            background: #f1f5f9; 
            color: #475569; 
            padding: 18px 45px; 
            font-size: 26px; 
            border-radius: 25px; 
            box-shadow: 0 6px 0 #cbd5e1;
        }
        .btn-nav:hover { background: #e2e8f0; transform: translateY(-2px); }
        .btn-nav:active { transform: translateY(4px); box-shadow: 0 2px 0 #cbd5e1; }

        .btn-next { 
            background: var(--primary); 
            color: white; 
            box-shadow: 0 6px 0 #0369a1; 
        }
        .btn-next:hover { background: #38bdf8; }
        .btn-next:active { transform: translateY(4px); box-shadow: 0 2px 0 #0369a1; }

        #music-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            background: white;
            border: 4px solid var(--primary);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--primary);
            font-size: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            z-index: 100;
            transition: all 0.3s;
        }
        
        #music-toggle:hover { transform: rotate(15deg) scale(1.1); }

        /* Scroll Hint Icon */
        .scroll-hint {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #94a3b8;
            opacity: 0.6;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);}
            40% {transform: translateX(-50%) translateY(-5px);}
            60% {transform: translateX(-50%) translateY(-3px);}
        }
    </style>
</head>
<body>

    <!-- Background Music -->
    <audio id="bg-music" loop preload="auto">
        <source src="https://cdn.pixabay.com/audio/2022/01/18/audio_d0a13f69d2.mp3" type="audio/mpeg">
    </audio>
    
    <!-- Sound Effect: Sorakan Heboh -->
    <audio id="sfx-cheer" preload="auto">
        <source src="https://www.soundjay.com/human/applause-01.mp3" type="audio/mpeg">
    </audio>

    <button id="music-toggle" onclick="toggleMusic()">
        <i id="music-icon" class="fas fa-music"></i>
    </button>

    <div class="presentation-box" id="presentation-box">
        <!-- Slide 0: Start -->
        <div class="slide active" id="slide-start">
            <i class="fas fa-bible" style="font-size: 130px; color: #0ea5e9; margin-bottom: 40px;"></i>
            <h1>Cerdas Cermat Alkitab</h1>
            <p style="font-size: 30px; color: #64748b; font-weight: 600;">Edisi Khusus: Injil Yohanes</p>
            <div style="margin-top: 60px;">
                <button class="btn btn-reveal" onclick="startQuiz()">Mulai Kuis! <i class="fas fa-play"></i></button>
            </div>
            <div class="scroll-hint">Gulir ke bawah untuk mulai <i class="fas fa-mouse"></i></div>
        </div>

        <!-- Dynamic Question Slides -->
        <div id="quiz-slides-container"></div>

        <!-- Final Slide -->
        <div class="slide" id="slide-finish">
            <i class="fas fa-star" style="font-size: 150px; color: #f59e0b; margin-bottom: 30px;"></i>
            <h1>Selesai!</h1>
            <p style="font-size: 36px; color: #0ea5e9; font-weight: 700;">Luar biasa! Kalian semua Juara!</p>
            <button class="btn btn-reveal" style="margin-top: 50px;" onclick="location.reload()">Ulangi Kuis <i class="fas fa-sync"></i></button>
        </div>

        <!-- Navigation -->
        <div class="controls" id="nav-controls" style="display: none;">
            <button class="btn btn-nav" id="prev-btn" onclick="prevSlide()">
                <i class="fas fa-chevron-left"></i> Kembali
            </button>
            <button class="btn btn-nav btn-next" id="next-btn" onclick="nextSlide()">
                Selanjutnya <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Berapa jumlah ikan dalam peristiwa danau tiberias?", a: "153 Ekor", r: "Yohanes 21:11" },
            { q: "Apa perintah utama Yesus kepada murid-murid-Nya dalam Yohanes 15:12?", a: "Saling Mengasihi", r: "Yohanes 15:12" },
            { q: "Apakah arti dari Golgoltha?", a: "Bukit Tengkorak", r: "Yohanes 19:17" },
            { q: "Sebutkan isi dari ayat Yohanes 15:5!", a: "“Akulah pokok anggur dan kamulah ranting-rantingnya. Barangsiapa tinggal di dalam Aku dan Aku di dalam dia, ia berbuah banyak, sebab di luar Aku kamu tidak dapat berbuat apa-apa.”", r: "Yohanes 15:5" },
            { q: "Yesus berkata kepada salah satu muridNya: \"Gembalakanlah domba-domba-Ku\siapakah nama murid Yesus itu"?", a: "Petrus", r: "Yohanes 21:15-19" },
            { q: "Siapakah yang memerintahkan memasang tulisan di kayu salib Yesus, yang bunyinya: \"Raja orang Yahudi\"?", a: "Pilatus", r: "Yohanes 19:19" },
            { q: "Siapa yang menguburkan Yesus bersama Yusuf dari Arimatea?", a: "Nikodemus", r: "Yohanes 19:39" },
            { q: "Siapa nama imam besar pada saat Yesus disalib?", a: "Hanas", r: "Yohanes 18:13" },
            { q: "Berapa jumlah orang yang disalibkan bersama-sama dengan Yesus?", a: "2 Orang", r: "Yohanes 19:18" },
            { q: "Siapakah yang pertama kali datang dan pagi pagi sekali setelah Tuhan Yesus dikubur?", a: "Maria Magdalena", r: "Yohanes 20:1" }
        ];

        const container = document.getElementById('quiz-slides-container');
        const presentationBox = document.getElementById('presentation-box');
        const bgMusic = document.getElementById('bg-music');
        const sfxCheer = document.getElementById('sfx-cheer');
        
        let currentSlideIdx = 0;
        let isMusicPlaying = false;
        let isThrottled = false; // Untuk mencegah scroll terlalu cepat

        // Create Slides
        questions.forEach((item, index) => {
            const slideDiv = document.createElement('div');
            slideDiv.className = 'slide quiz-slide';
            slideDiv.id = `quiz-${index}`;
            slideDiv.innerHTML = `
                <div class="question-num">SOAL NOMOR ${index + 1}</div>
                <div class="question-text">${item.q}</div>
                
                <div class="answer-area">
                    <button class="btn btn-reveal" id="reveal-btn-${index}" onclick="showAnswer(${index})">
                        Tampilkan Jawaban <i class="fas fa-lightbulb"></i>
                    </button>
                    
                    <div class="answer-box" id="answer-${index}">
                        <div class="answer-text">${item.a}</div>
                        <div class="verse-ref">${item.r}</div>
                    </div>
                </div>
            `;
            container.appendChild(slideDiv);
        });

        const allSlides = document.querySelectorAll('.slide');

        function showSlide(idx) {
            allSlides.forEach(s => s.classList.remove('active'));
            allSlides[idx].classList.add('active');
            
            const nav = document.getElementById('nav-controls');
            if(idx === 0 || idx === allSlides.length - 1) {
                nav.style.display = 'none';
            } else {
                nav.style.display = 'flex';
            }
        }

        function startQuiz() {
            if (!isMusicPlaying) toggleMusic();
            nextSlide();
        }

        function nextSlide() {
            if (currentSlideIdx < allSlides.length - 1) {
                currentSlideIdx++;
                showSlide(currentSlideIdx);
            }
        }

        function prevSlide() {
            if (currentSlideIdx > 0) {
                currentSlideIdx--;
                showSlide(currentSlideIdx);
            }
        }

        function showAnswer(idx) {
            document.getElementById(`answer-${idx}`).style.display = 'block';
            document.getElementById(`reveal-btn-${idx}`).style.display = 'none';
            
            sfxCheer.currentTime = 0;
            sfxCheer.play().catch(e => console.warn("Audio play blocked", e));
        }

        function toggleMusic() {
            const icon = document.getElementById('music-icon');
            if (bgMusic.paused) {
                bgMusic.play().then(() => {
                    bgMusic.volume = 0.15;
                    isMusicPlaying = true;
                    icon.className = 'fas fa-pause';
                }).catch(e => console.error("BG Music failed:", e));
            } else {
                bgMusic.pause();
                isMusicPlaying = false;
                icon.className = 'fas fa-music';
            }
        }

        // Fitur Scroll Navigation
        window.addEventListener('wheel', (e) => {
            if (isThrottled) return;

            isThrottled = true;
            setTimeout(() => { isThrottled = false; }, 800); // Jeda 0.8 detik antar scroll

            if (e.deltaY > 0) {
                // Scroll bawah = Selanjutnya
                if (currentSlideIdx === 0 && !isMusicPlaying) toggleMusic();
                nextSlide();
            } else if (e.deltaY < 0) {
                // Scroll atas = Kembali
                prevSlide();
            }
        });

        // Fitur Navigasi Keyboard (Opsional tapi berguna)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextSlide();
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevSlide();
        });

        window.onload = () => {
            showSlide(0);
        };
    </script>
</body>
</html>
